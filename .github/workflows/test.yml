name: 'Test'
on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * SAT'

jobs:
  setup-actions:
    name: 'Setup actions'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v4'
      - name: 'Cache node packages'
        uses: 'actions/cache@v4'
        with:
          path: '~/.npm'
          key: "${{ hashFiles('package-lock.json') }}-${{ hashFiles('.github/actions/check-version/package-lock.json') }}"
      - name: 'Build actions'
        run: |
          npm ci
          npm run --silent build
          mkdir -p ${{ github.workspace }}/actions/setup-vim
          cp action.js action.yml ${{ github.workspace }}/actions/setup-vim

          cd ${{ github.workspace }}/.github/actions/check-version
          npm ci
          npm run --silent build
          mkdir -p ${{ github.workspace }}/actions/check-version
          cp action.js action.yml ${{ github.workspace }}/actions/check-version
      - name: 'Upload actions as artifact'
        uses: 'actions/upload-artifact@v4'
        with:
          name: 'actions'
          path: 'actions'
      - name: 'Get GitHub GraphQL API rate limit'
        id: rate_limit
        uses: octokit/graphql-action@v2.x
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          query: |
            query {
              rateLimit {
                limit
                cost
                remaining
                resetAt
              }
            }
      - name: 'Show GitHub GraphQL API rate limit'
        run: echo "${{ steps.rate_limit.outputs.data }}"

  test:
    name: "${{ matrix.gui_cui }}/${{ matrix.dl_bd }}: ${{ matrix.vim_type }} ${{ matrix.vim_version }} on ${{ matrix.platform }}${{ matrix.arch == 'x86' && ' (x86)' || ''}}"
    strategy:
      matrix:
        vim_type: ['Vim']
        # vim_version: ['head']
        # platform: ['MacOS']
        gui_cui: ['CUI']
        dl_bd: ['BD']
        arch: ['x86_64']
        # vim_type: ['Vim', 'Neovim', 'MacVim']
        # vim_version: ['head', 'prev1', 'prev2', 'prev3']
        platform: ['Windows']
        # gui_cui: ['GUI', 'CUI']
        # dl_bd: ['DL', 'AT', 'BD']
        # arch: ['x86_64']

        include:
          # aliases
          # - platform: 'Linux'
          #   os: 'ubuntu-latest'
          # - platform: 'MacOS'
          #   os: 'macos-latest'
          - platform: 'Windows'
            os: 'windows-latest'
          # - gui_cui: 'GUI'
          #   gui: 'yes'
          - gui_cui: 'CUI'
            gui: 'no'
          # - dl_bd: 'DL'
          #   download: 'always'
          # - dl_bd: 'AT'
          #   download: 'available'
          - dl_bd: 'BD'
            download: 'never'
          # arch=x86 is only for Windows GUI head
          # - vim_type: 'Vim'
          #   platform: 'Windows'
          #   os: 'windows-latest'
          #   version: 'head'
          #   gui_cui: 'GUI'
          #   gui: 'yes'
          #   dl_bd: 'BD'
          #   download: 'never'
          #   arch: 'x86'
          # Add versions
          # - vim_type: 'Vim'
          #   vim_version: 'prev1'
          #   version: 'v9.1.0000'
          # - vim_type: 'Vim'
          #   vim_version: 'prev2'
          #   version: 'v9.0.0000'
          # - vim_type: 'Vim'
          #   vim_version: 'prev3'
          #   version: 'v8.2.0000'
          - vim_type: 'Vim'
            vim_version: 'v8.1.0001'
          # - vim_type: 'Vim'
          #   vim_version: 'v8.0.0001'
          - vim_type: 'Vim'
            vim_version: 'v7.4'
          # - vim_type: 'Neovim'
          #   vim_version: 'prev1'
          #   version: 'v0.10.2'
          # - vim_type: 'Neovim'
          #   vim_version: 'prev2'
          #   version: 'v0.9.5'
          # - vim_type: 'Neovim'
          #   vim_version: 'prev3'
          #   version: 'v0.9.0'
          # - vim_type: 'MacVim'
          #   vim_version: 'prev1'
          #   version: 'release-179'  # v9.1.0000
          # - vim_type: 'MacVim'
          #   vim_version: 'prev2'
          #   version: 'snapshot-173'  # v9.0.0065
          # - vim_type: 'MacVim'
          #   vim_version: 'prev3'
          #   version: 'snapshot-162'  # v8.2.319
          # - vim_type: 'MacVim'
          #   vim_version: 'prev4'
          #   version: 'snapshot-148'  # v8.1.0039
          # - vim_type: 'MacVim'
          #   vim_version: 'prev5'
          #   version: 'snapshot-110'  # v8.0.0003
          # - vim_type: 'MacVim'
          #   vim_version: 'snapshot-74'  # v7.4.622

        exclude:
          # DL Vim on MacOS is unavailable
          - vim_type: 'Vim'
            platform: 'MacOS'
            dl_bd: 'DL'
          # GUI version of Neovim is unavailable (also skip on Windows)
          - vim_type: 'Neovim'
            gui_cui: 'GUI'
          # Build Neovim on Windows is not supported yet
          - vim_type: 'Neovim'
            platform: 'Windows'
            dl_bd: 'BD'
          # GUI version of MacVim is unavailable
          - platform: 'MacOS'
            gui_cui: 'GUI'
          # MacVim is available only on MacOS
          - vim_type: 'MacVim'
            platform: 'Linux'
          - vim_type: 'MacVim'
            platform: 'Windows'
          # x86 in win32-installer sometimes missing
          - dl_bd: 'DL'
            arch: 'x86'

      fail-fast: false

    needs: 'setup-actions'
    runs-on: '${{ matrix.os }}'
    timeout-minutes: 20
    defaults:
      run:
        shell: bash

    steps:
      - name: 'Download actions'
        uses: 'actions/download-artifact@v4'
        with:
          name: 'actions'
          path: 'actions'
      - name: 'Setup Vim'
        id: 'vim'
        uses: './actions/setup-vim'
        with:
          vim_version: '${{ matrix.vim_version }}'
          vim_type: '${{ matrix.vim_type }}'
          gui: '${{ matrix.gui }}'
          arch: '${{ matrix.arch }}'
          download: '${{ matrix.download }}'
          cache: 'test-${{ github.run_id }}-${{ github.run_attempt }}-${{ strategy.job-index }}'
      - name: 'Check Setup Vim is done without cache'
        if: "matrix.download == 'never'"
        run: |
          if [[ "${{ steps.vim.outputs.cache_hit }}" == "true" ]]; then
            echo "Cache should not hit, but hit."
            exit 1
          else
            echo "Cache did not hit as expected."
          fi
      - name: 'Check Vim version'
        uses: './actions/check-version'
        with:
          expected_vim_version: '${{ steps.vim.outputs.actual_vim_version }}'
          executable: '${{ steps.vim.outputs.executable }}'
          executable_path: '${{ steps.vim.outputs.executable_path }}'
          vim_type: '${{ matrix.vim_type }}'
          gui: '${{ matrix.gui }}'
          arch: '${{ matrix.arch }}'
      - if: 'failure()'
        run: |
          cd $RUNNER_TEMP/repos/vim/v7.4
          git diff
          git checkout .
          cat > test.sh <<EOF

          git diff @ v7.4.960 | git apply --include src/Make_mvc.mak

          vim -es <<VIM
          :e src/GvimExt/Makefile
          /^!include <Win32.mak>
          :.-1,.d
          :i
          !elseif "$(USE_WIN32MAK)"=="yes"
          !include <Win32.mak>
          !else
          cc = cl
          link = link
          rc = rc
          cflags = -nologo -c
          lflags = -incremental:no -nologo
          rcflags = /r
          olelibsdll = ole32.lib uuid.lib oleaut32.lib user32.lib gdi32.lib advapi32.lib
          .
          :w
          :e src/Make_mvc.mak
          /^!include <Win32.mak>
          :.-1,.d
          :i
          !elseif "$(USE_WIN32MAK)"=="yes"
          !include <Win32.mak>
          !else
          link = link
          .
          :wq
          VIM

          git diff

          cd src
          cmd.exe //c install.bat
          result=\$?
          echo "Result: \$result"
          git checkout .
          if [[ "\$result" == '0' ]]; then
            echo "exit 1"
            exit 1
          fi
          echo "exit 0"
          EOF
          git fetch origin --tags -q
          git bisect start
          git bisect old v7.4
          git bisect new v7.4.960
          git bisect run bash ./test.sh
      # - uses: mxschmitt/action-tmate@v3
      #   if: failure()
      #   timeout-minutes: 300
      - name: 'Delete installed Vim to reinstall'
        if: "matrix.download == 'never'"
        run: |
          rm -fr "${{ steps.vim.outputs.install_path }}"
      - name: 'Setup Vim with cache'
        id: 'vim_with_cache'
        if: "matrix.download == 'never'"
        uses: './actions/setup-vim'
        with:
          vim_version: '${{ matrix.version || matrix.vim_version }}'
          vim_type: '${{ matrix.vim_type }}'
          gui: '${{ matrix.gui }}'
          download: '${{ matrix.download }}'
          cache: 'test-${{ github.run_id }}-${{ github.run_attempt }}-${{ strategy.job-index }}'
      - name: 'Check Setup Vim is done with cache'
        if: "matrix.download == 'never'"
        run: |
          if [[ "${{ steps.vim_with_cache.outputs.cache_hit }}" == "true" ]]; then
            echo "Cache hit!"
          else
            echo "Cache not hit..."
            exit 1
          fi

  multiple-test:
    name: 'Install multiple Vims on ${{ matrix.platform }}'
    strategy:
      matrix:
        platform: ['Linux', 'MacOS', 'Windows']

        include:
          - platform: 'Linux'
            os: 'ubuntu-latest'
          - platform: 'MacOS'
            os: 'macos-latest'
          - platform: 'Windows'
            os: 'windows-latest'
      fail-fast: false

    if: false
    needs: 'setup-actions'
    runs-on: '${{ matrix.os }}'
    defaults:
      run:
        shell: bash

    steps:
      - name: 'Download actions'
        uses: 'actions/download-artifact@v4'
        with:
          name: 'actions'
          path: 'actions'

      - name: 'Setup Vim head'
        id: 'vim_head'
        uses: './actions/setup-vim'
        with:
          vim_version: 'head'
          vim_type: 'Vim'
      - name: 'Setup Vim latest'
        id: 'vim_latest'
        uses: './actions/setup-vim'
        with:
          vim_version: 'v9.1.0000'
          vim_type: 'Vim'
      - name: 'Setup Neovim head'
        id: 'neovim_head'
        uses: './actions/setup-vim'
        with:
          vim_version: 'head'
          vim_type: 'Neovim'
      - name: 'Setup Neovim latest'
        id: 'neovim_latest'
        uses: './actions/setup-vim'
        with:
          vim_version: 'v0.9.5'
          vim_type: 'Neovim'
      - name: 'Setup MacVim head'
        if: "matrix.platform == 'MacOS'"
        id: 'macvim_head'
        uses: './actions/setup-vim'
        with:
          vim_version: 'head'
          vim_type: 'MacVim'
      - name: 'Setup MacVim latest'
        if: "matrix.platform == 'MacOS'"
        id: 'macvim_latest'
        uses: './actions/setup-vim'
        with:
          vim_version: 'release-178'
          vim_type: 'MacVim'

      - name: 'Check Vim head version'
        if: "always() && steps.vim_head.conclusion == 'success'"
        uses: './actions/check-version'
        with:
          expected_vim_version: '${{ steps.vim_head.outputs.actual_vim_version }}'
          executable: '${{ steps.vim_head.outputs.executable }}'
          executable_path: '${{ steps.vim_head.outputs.executable_path }}'
          vim_type: 'Vim'
          use_executable_path: 'yes'
      - name: 'Check Vim latest version'
        if: "always() && steps.vim_latest.conclusion == 'success'"
        uses: './actions/check-version'
        with:
          expected_vim_version: '${{ steps.vim_latest.outputs.actual_vim_version }}'
          executable: '${{ steps.vim_latest.outputs.executable }}'
          executable_path: '${{ steps.vim_latest.outputs.executable_path }}'
          vim_type: 'Vim'
          use_executable_path: 'yes'
      - name: 'Check Neovim head version'
        if: "always() && steps.neovim_head.conclusion == 'success'"
        uses: './actions/check-version'
        with:
          expected_vim_version: '${{ steps.neovim_head.outputs.actual_vim_version }}'
          executable: '${{ steps.neovim_head.outputs.executable }}'
          executable_path: '${{ steps.neovim_head.outputs.executable_path }}'
          vim_type: 'Neovim'
          use_executable_path: 'yes'
      - name: 'Check Neovim latest version'
        if: "always() && steps.neovim_latest.conclusion == 'success'"
        uses: './actions/check-version'
        with:
          expected_vim_version: '${{ steps.neovim_latest.outputs.actual_vim_version }}'
          executable: '${{ steps.neovim_latest.outputs.executable }}'
          executable_path: '${{ steps.neovim_latest.outputs.executable_path }}'
          vim_type: 'Neovim'
          use_executable_path: 'yes'
      - name: 'Check MacVim head version'
        if: "always() && steps.macvim_head.conclusion == 'success'"
        uses: './actions/check-version'
        with:
          expected_vim_version: '${{ steps.macvim_head.outputs.actual_vim_version }}'
          executable: '${{ steps.macvim_head.outputs.executable }}'
          executable_path: '${{ steps.macvim_head.outputs.executable_path }}'
          vim_type: 'MacVim'
          use_executable_path: 'yes'
      - name: 'Check MacVim latest version'
        if: "always() && steps.macvim_latest.conclusion == 'success'"
        uses: './actions/check-version'
        with:
          expected_vim_version: '${{ steps.macvim_latest.outputs.actual_vim_version }}'
          executable: '${{ steps.macvim_latest.outputs.executable }}'
          executable_path: '${{ steps.macvim_latest.outputs.executable_path }}'
          vim_type: 'MacVim'
          use_executable_path: 'yes'


  show-limit-after:
    name: 'Show GitHub API rate limit after test'
    needs: ['test', 'multiple-test']
    runs-on: 'ubuntu-latest'
    timeout-minutes: 1
    if: 'always()'
    steps:
      - name: 'Get GitHub GraphQL API rate limit'
        id: rate_limit
        uses: octokit/graphql-action@v2.x
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          query: |
            query {
              rateLimit {
                limit
                cost
                remaining
                resetAt
              }
            }
      - name: 'Show GitHub GraphQL API rate limit'
        run: echo "${{ steps.rate_limit.outputs.data }}"
